<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: #1e1a24; padding: 40px 24px 60px; -webkit-font-smoothing: antialiased; }
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; color: #a89eb5; text-decoration: none;

  }
  .back-link:hover { color: #2596be; }
  h1 { text-align: center; font-family: 'Outfit', sans-serif; font-size: 40px; font-weight: 700; color: #f0ece7; margin-bottom: 6px; letter-spacing: -0.02em; }

  h1 .p { color: #8b5a9e; }

  .subtitle { text-align: center; font-size: 14px; color: #a89eb5; margin-bottom: 40px; line-height: 1.5; }

  .palette-section {
    max-width: 1400px;
    margin: 0 auto 48px;
    background: #251f2e;
    border-radius: 20px;
    padding: 32px;
    border: 1px solid rgba(255,255,255,0.04);
    transition: box-shadow 0.3s ease;
  }
  .palette-section:hover { box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
  .palette-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .palette-label { font-family: 'Outfit', sans-serif; font-size: 22px; font-weight: 700; color: #f0ece7; letter-spacing: -0.01em; }
  .palette-desc { font-size: 13px; color: #a89eb5; max-width: 500px; line-height: 1.5; }
  .chips { display: flex; gap: 6px; }
  .chip {
    width: 32px; height: 32px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.08);
    position: relative;
    transition: transform 0.2s ease;
  }
  .chip:hover { transform: scale(1.15); }
  .chip-label {
    position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%);
    font-size: 8px; color: #666; white-space: nowrap;
  }

  /* Web frame */
  .web-frame {
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  }
  .browser-bar {
    height: 36px;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    background: #1e1a24;
  }
  .browser-dots { display: flex; gap: 6px; }
  .browser-dot { width: 10px; height: 10px; border-radius: 50%; }
  .browser-dot.red { background: #ff5f57; }
  .browser-dot.yellow { background: #febc2e; }
  .browser-dot.green { background: #28c840; }
  .browser-url {
    flex: 1; height: 22px; background: #1a1a1e; border-radius: 4px;
    margin-left: 8px; display: flex; align-items: center; padding: 0 10px;
    font-size: 11px; color: #666;
  }

  /* Dashboard layout */
  .dashboard {
    display: flex;
    min-height: 520px;
  }
  .sidebar {
    width: 220px;
    padding: 20px 0;
    display: flex;
    flex-direction: column;
  }
  .sidebar-logo {
    font-size: 16px;
    font-weight: 800;
    padding: 0 20px 20px;
    letter-spacing: -0.5px;
  }
  .nav-items { flex: 1; }
  .nav-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .nav-link svg { width: 18px; height: 18px; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .nav-link.active { font-weight: 700; }
  .sidebar-user {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
  }
  .sidebar-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
  }

  .main-content {
    flex: 1;
    padding: 24px 28px;
    overflow: hidden;
  }
  .greeting { font-family: 'Outfit', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.01em; }
  .greeting-sub { font-size: 13px; margin-bottom: 20px; }

  .cards-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 20px;
  }
  .stat-card {
    padding: 16px;
    border-radius: 10px;
  }
  .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-value { font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 700; }
  .stat-sub { font-size: 11px; margin-top: 4px; }

  .action-items { margin-bottom: 20px; }
  .action-title { font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 10px; }
  .action-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 13px;
  }
  .action-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

  .upcoming-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .upcoming-table th {
    text-align: left;
    padding: 8px 12px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .upcoming-table td { padding: 10px 12px; }
  .status-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 600;
  }
  .progress-bar {
    width: 80px; height: 6px; border-radius: 3px; overflow: hidden;
  }
  .progress-fill { height: 100%; border-radius: 3px; }

  @media print {
    .palette-section {
      page-break-after: always;
      break-after: always;
      page-break-inside: avoid;
      break-inside: avoid;
    }
    .palette-section:last-child {
      page-break-after: avoid;
      break-after: avoid;
    }
  }
</style>
</head>

    const section = document.createElement('div');
    section.className = 'palette-section';
    if (p.selected) {
      section.style.border = '2px solid #2596be';
      section.style.boxShadow = '0 0 0 4px rgba(37, 150, 190, 0.15), 0 8px 40px rgba(0,0,0,0.2)';
    }

    const chipsHTML = p.chips.map(c =>
      `<div class="chip" style="background:${c};"></div>`
    ).join('');

    const selectedBadge = p.selected
      ? '<span style="display: inline-block; background: #2596be; color: white; font-size: 10px; font-weight: 700; padding: 4px 12px; border-radius: 6px; margin-left: 12px; letter-spacing: 0.06em; text-transform: uppercase; vertical-align: middle;">SELECTED</span>'
      : '';

    section.innerHTML = `
      <div class="palette-header">
        <div>
          <div class="palette-label">${p.name} ${selectedBadge}</div>
          <div class="palette-desc">${p.desc}</div>
        </div>
        <div class="chips">${chipsHTML}</div>
      </div>
      ${renderDashboard(p)}
    `;

    body.appendChild(section);
  });
});
</script>

</body>
</html>
