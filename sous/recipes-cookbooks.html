<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUS - Cookbooks</title>
<link rel="stylesheet" href="design.css">
<style>
  .nav-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
  .nav-item.active .nav-avatar { border-color: var(--primary); }
  .nav-icon svg { stroke-width: 1.8; }
  .nav-item { font-size: 11px; font-weight: 500; letter-spacing: 0.2px; }
  .nav-item.active { font-weight: 600; }
  .nav-item.active::after { content: ''; display: block; width: 4px; height: 4px; border-radius: 50%; background: var(--primary); margin-top: 2px; }

  .cookbook-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--sp-4);
    padding: var(--sp-4);
  }
  .cookbook-card {
    text-decoration: none;
    color: var(--text);
    display: block;
  }
  .cookbook-card-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: var(--radius-md);
    display: block;
  }
  .cookbook-card-title {
    font-size: var(--text-sm);
    font-weight: var(--weight-bold);
    margin-top: var(--sp-2);
    line-height: var(--leading-tight);
  }
  .cookbook-card-creator {
    font-size: var(--text-xs);
    color: var(--text-light);
    margin-top: 2px;
  }
  .cookbook-card-count {
    font-size: var(--text-xs);
    color: var(--text-muted);
    margin-top: 2px;
  }

  .section-divider {
    padding: var(--sp-6) var(--sp-4) var(--sp-2);
  }
  .section-divider-title {
    font-size: var(--text-sm);
    font-weight: var(--weight-semibold);
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>
</head>
