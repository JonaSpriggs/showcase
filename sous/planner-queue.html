<style>
  .nav-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
  .nav-item.active .nav-avatar { border-color: var(--primary); }
  .nav-icon svg { stroke-width: 1.8; }
  .nav-item { font-size: 11px; font-weight: 500; letter-spacing: 0.2px; }
  .nav-item.active { font-weight: 600; }
  .nav-item.active::after { content: ''; display: block; width: 4px; height: 4px; border-radius: 50%; background: var(--primary); margin-top: 2px; }

  /* Queue card list */
  .queue-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .queue-thumb {
    width: 56px; height: 56px;
    border-radius: 12px; object-fit: cover; flex-shrink: 0;
  }
  .queue-info { flex: 1; min-width: 0; }
  .queue-title {
    font-size: 15px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .queue-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .queue-actions { display: flex; gap: 8px; }
  .queue-action-btn {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--surface); border: none;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .queue-action-btn:hover { background: var(--surface-dark); }
  .queue-action-btn svg {
    width: 16px; height: 16px; stroke: var(--text-light);
    fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }
  .queue-action-btn.remove:hover { background: var(--error-light); }
  .queue-action-btn.remove:hover svg { stroke: var(--error); }
</style>
</head>
