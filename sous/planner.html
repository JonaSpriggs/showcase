<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUS - Meal Planner</title>
<link rel="stylesheet" href="design.css">
<style>
  .nav-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
  .nav-item.active .nav-avatar { border-color: var(--primary); }
  .nav-icon svg { stroke-width: 1.8; }
  .nav-item { font-size: 11px; font-weight: 500; letter-spacing: 0.2px; }
  .nav-item.active { font-weight: 600; }
  .nav-item.active::after { content: ''; display: block; width: 4px; height: 4px; border-radius: 50%; background: var(--primary); margin-top: 2px; }

  /* Header with generate button */
  .header-btn {
    padding: 6px 14px;
    border-radius: var(--radius-full);
    font-size: var(--text-xs);
    font-weight: var(--weight-semibold);
    color: var(--primary);
    background: transparent;
    border: 1.5px solid var(--primary);
    cursor: pointer;
    font-family: var(--font-family);
    transition: all var(--transition-fast);
    text-decoration: none;
  }
  .header-btn:hover { background: var(--primary-light); }

  /* Week navigation */
  .week-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--sp-4);
    padding: var(--sp-3) var(--sp-4);
    background: var(--bg);
  }
  .week-nav-label {
    font-size: var(--text-base);
    font-weight: var(--weight-semibold);
    color: var(--text);
    min-width: 140px;
    text-align: center;
  }
  .week-nav-btn {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-full);
    background: var(--surface);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background var(--transition-fast);
  }
  .week-nav-btn:hover { background: var(--surface-dark); }
  .week-nav-btn svg {
    width: 18px;
    height: 18px;
    stroke: var(--text);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Day rows */
  .day-row {
    padding: var(--sp-3) var(--sp-4);
    border-bottom: 1px solid var(--border);
  }
  .day-row:last-child { border-bottom: none; }

  .day-label {
    font-size: var(--text-xs);
    font-weight: var(--weight-bold);
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: var(--sp-2);
  }
  .day-label.today {
    color: var(--primary);
  }

  .day-meals {
    display: flex;
    gap: var(--sp-2);
    align-items: center;
    flex-wrap: wrap;
  }

  /* Meal card (compact) */
  .meal-card {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    padding: var(--sp-2) var(--sp-3);
    background: var(--white);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    transition: box-shadow var(--transition-fast);
    text-decoration: none;
    color: var(--text);
    flex-shrink: 0;
  }
  .meal-card:hover { box-shadow: var(--shadow-md); }

  .meal-thumb {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    flex-shrink: 0;
  }
  .meal-info {
    min-width: 0;
  }
  .meal-title {
    font-size: var(--text-sm);
    font-weight: var(--weight-semibold);
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
  }
  .meal-meta {
    font-size: var(--text-xs);
    color: var(--text-muted);
  }

  /* Add button for day */
  .day-add-btn {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-md);
    background: var(--surface);
    border: 2px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all var(--transition-fast);
    text-decoration: none;
    flex-shrink: 0;
  }
  .day-add-btn:hover {
    border-color: var(--primary);
    background: var(--primary-light);
  }
  .day-add-btn svg {
    width: 18px;
    height: 18px;
    stroke: var(--text-muted);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
  }
  .day-add-btn:hover svg { stroke: var(--primary); }

  /* Empty day */
  .day-empty {
    font-size: var(--text-xs);
    color: var(--text-muted);
    font-style: italic;
    padding: var(--sp-2) 0;
  }
</style>
</head>
