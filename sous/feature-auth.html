<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUS - Auth & Settings</title>
<style>
  :root { --sous-green: #6b8f5e; --bg: #f7f5f0; --text: #2d3a2e; --text-light: #7a8272; --surface: #eae7df; --border: #ddd8cf; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--surface); color: var(--text); padding: 40px 20px; }
  .back { display: inline-flex; align-items: center; gap: 6px; color: var(--text-light); text-decoration: none; font-size: 14px; margin-bottom: 24px; transition: color 150ms; }
  .back:hover { color: var(--text); }
  h1 { text-align: center; font-size: 32px; font-weight: 800; letter-spacing: -1px; color: var(--sous-green); margin-bottom: 4px; }
  .subtitle { text-align: center; font-size: 14px; color: var(--text-light); margin-bottom: 40px; }
  .grid { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; max-width: 1800px; margin: 0 auto; }
  .card { background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(45,58,46,0.08); overflow: hidden; width: 300px; text-decoration: none; color: var(--text); transition: transform 0.2s ease, box-shadow 0.2s ease; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(45,58,46,0.15); }
  .card-preview { width: 300px; height: 540px; overflow: hidden; border-bottom: 1px solid var(--border); position: relative; }
  .card-preview iframe { width: 390px; height: 844px; border: none; transform: scale(0.75); transform-origin: top left; pointer-events: none; }
  .card-info { padding: 12px 14px; }
  .card-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .card-path { font-size: 11px; color: var(--text-light); }
</style>
</head>
<body>
<a class="back" href="index.html">&larr; All Features</a>
<h1>Auth & Settings</h1>
<p class="subtitle">Login, register, settings, business registration, and notifications</p>

<div class="grid">
  <a class="card" href="login.html">
    <div class="card-preview"><iframe src="login.html" loading="lazy"></iframe></div>
    <div class="card-info"><div class="card-name">Login</div><div class="card-path">(auth)/login</div></div>
  </a>
  <a class="card" href="register.html">
    <div class="card-preview"><iframe src="register.html" loading="lazy"></iframe></div>
    <div class="card-info"><div class="card-name">Register</div><div class="card-path">(auth)/register</div></div>
  </a>
  <a class="card" href="notifications.html">
    <div class="card-preview"><iframe src="notifications.html" loading="lazy"></iframe></div>
    <div class="card-info"><div class="card-name">Notifications</div><div class="card-path">(dashboard)/notifications</div></div>
  </a>
  <a class="card" href="settings.html">
    <div class="card-preview"><iframe src="settings.html" loading="lazy"></iframe></div>
    <div class="card-info"><div class="card-name">Settings</div><div class="card-path">(dashboard)/settings</div></div>
  </a>
  <a class="card" href="settings-business.html">
    <div class="card-preview"><iframe src="settings-business.html" loading="lazy"></iframe></div>
    <div class="card-info"><div class="card-name">Become Business</div><div class="card-path">(dashboard)/settings/business</div></div>
  </a>
</div>
</body>
</html>
