<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUS - Saved Recipes</title>
<link rel="stylesheet" href="design.css">
<style>
  .nav-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
  .nav-item.active .nav-avatar { border-color: var(--primary); }
  .nav-icon svg { stroke-width: 1.8; }
  .nav-item { font-size: 11px; font-weight: 500; letter-spacing: 0.2px; }
  .nav-item.active { font-weight: 600; }
  .nav-item.active::after { content: ''; display: block; width: 4px; height: 4px; border-radius: 50%; background: var(--primary); margin-top: 2px; }

  .search-area { padding: var(--sp-3) var(--sp-4); }
  .search-wrapper svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    stroke: var(--text-muted);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;
  }

  .recipe-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--sp-3);
    padding: 0 var(--sp-4) var(--sp-4);
  }
  .recipe-card {
    text-decoration: none;
    color: var(--text);
    display: block;
  }
  .recipe-card-img-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    border-radius: var(--radius-md);
    overflow: hidden;
  }
  .recipe-card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .recipe-card-creator-avatar {
    position: absolute;
    bottom: 8px;
    right: 8px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--white);
    box-shadow: var(--shadow-sm);
  }
  .recipe-card-title {
    font-size: var(--text-sm);
    font-weight: var(--weight-semibold);
    margin-top: var(--sp-2);
    line-height: var(--leading-tight);
  }
  .recipe-card-creator {
    font-size: var(--text-xs);
    color: var(--text-light);
    margin-top: 2px;
  }
  .recipe-card-meta {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    margin-top: var(--sp-1);
  }
  .recipe-card-time {
    font-size: var(--text-xs);
    color: var(--text-light);
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .recipe-card-time svg {
    width: 12px;
    height: 12px;
    stroke: var(--text-light);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .recipe-card-tag {
    font-size: 10px;
    font-weight: var(--weight-semibold);
    background: var(--primary-light);
    color: var(--text);
    padding: 2px 8px;
    border-radius: var(--radius-full);
  }
</style>
</head>
