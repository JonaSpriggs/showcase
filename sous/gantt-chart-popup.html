<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUS - Cooking Timeline (Gantt Chart)</title>
<link rel="stylesheet" href="design.css">
<style>
  .nav-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
  .nav-item.active .nav-avatar { border-color: var(--primary); }
  .nav-icon svg { stroke-width: 1.8; }
  .nav-item { font-size: 11px; font-weight: 500; letter-spacing: 0.2px; }
  .nav-item.active { font-weight: 600; }
  .nav-item.active::after { content: ''; display: block; width: 4px; height: 4px; border-radius: 50%; background: var(--primary); margin-top: 2px; }

  /* Hero image */
  .hero-image {
    width: 100%;
    height: 280px;
    object-fit: cover;
    display: block;
  }
  .hero-wrap {
    position: relative;
  }
  .hero-btn {
    position: absolute;
    top: 52px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: none;
    text-decoration: none;
  }
  .hero-btn svg {
    width: 20px;
    height: 20px;
    stroke: #fff;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .hero-btn-back { left: 16px; }
  .hero-btn-save { right: 16px; }

  /* Dimmed background content */
  .dimmed-bg {
    opacity: 0.3;
    pointer-events: none;
  }

  /* Detail content (simplified for background) */
  .detail-content {
    padding: var(--sp-4);
  }
  .detail-title {
    font-size: var(--text-2xl);
    font-weight: var(--weight-bold);
    line-height: var(--leading-tight);
    margin-bottom: var(--sp-2);
  }
  .detail-tags {
    display: flex;
    gap: var(--sp-2);
    margin-bottom: var(--sp-3);
  }
  .meta-row {
    display: flex;
    gap: var(--sp-4);
    margin-bottom: var(--sp-4);
  }
  .meta-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: var(--text-sm);
    color: var(--text-light);
  }
  .meta-item svg {
    width: 16px;
    height: 16px;
    stroke: var(--text-light);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Overlay backdrop scoped to phone frame */
  .phone-overlay-backdrop {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(28, 27, 24, 0.5);
    z-index: 100;
  }

  /* Gantt Modal */
  .gantt-modal {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 360px;
    background: var(--white);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    z-index: 101;
    overflow: hidden;
  }

  /* Modal header */
  .gantt-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px;
  }
  .gantt-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .gantt-header-title {
    font-size: var(--text-lg);
    font-weight: var(--weight-bold);
    color: var(--text);
  }
  .gantt-time-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: var(--radius-full);
    font-size: var(--text-xs);
    font-weight: var(--weight-semibold);
    background: var(--primary-light);
    color: var(--text);
  }
  .gantt-time-badge svg {
    width: 12px;
    height: 12px;
    stroke: var(--text);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .gantt-close {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: var(--surface);
    border-radius: var(--radius-full);
    cursor: pointer;
    color: var(--text);
    font-size: 16px;
    transition: background var(--transition-fast);
  }
  .gantt-close:hover {
    background: var(--surface-dark);
  }
  .gantt-close svg {
    width: 16px;
    height: 16px;
    stroke: var(--text);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Time axis */
  .gantt-time-axis {
    display: flex;
    justify-content: space-between;
    padding: 0 16px 8px;
    margin-left: 110px;
    font-size: var(--text-xs);
    color: var(--text-muted);
  }

  /* Gantt rows */
  .gantt-row {
    display: flex;
    align-items: center;
    height: 36px;
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
  }
  .gantt-row:last-child {
    border-bottom: none;
  }
  .gantt-label {
    width: 100px;
    font-size: 11px;
    color: var(--text-light);
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .gantt-track {
    flex: 1;
    position: relative;
    height: 24px;
  }
  .gantt-bar {
    position: absolute;
    height: 20px;
    border-radius: 6px;
    top: 2px;
    font-size: 9px;
    font-weight: 600;
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 6px;
  }
  .gantt-bar-active {
    background: var(--primary);
  }
  .gantt-bar-prep {
    background: var(--primary);
    opacity: 0.5;
    border: 1.5px dashed var(--primary);
  }

  /* Legend */
  .gantt-legend {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }
  .gantt-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: var(--text-xs);
    color: var(--text-light);
  }
  .legend-swatch-active {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    background: var(--primary);
  }
  .legend-swatch-prep {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    border: 1.5px dashed var(--primary);
    opacity: 0.5;
  }

  /* Edit note */
  .gantt-edit-note {
    padding: 0 16px 16px;
    font-size: var(--text-xs);
    font-style: italic;
    color: var(--text-muted);
  }
</style>
</head>
<body>
<div class="phone-frame" style="position: relative; overflow: hidden;">

  <!-- Dimmed recipe detail background -->
  <div class="dimmed-bg">

    <!-- Status Bar -->
    <div class="status-bar" style="position: absolute; top: 0; left: 0; right: 0; z-index: 10; background: transparent; color: #fff;">
      <span class="time">9:41</span>
      <div class="status-icons" style="color: #fff;">
        <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="4" width="3" height="8" rx="1" fill="currentColor"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="9" y="0" width="3" height="12" rx="1" fill="currentColor"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="currentColor" opacity="0.3"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2C5.5 2 3.2 3 1.5 4.7L0 3.2C2.1 1.2 4.9 0 8 0s5.9 1.2 8 3.2l-1.5 1.5C12.8 3 10.5 2 8 2z" fill="currentColor"/><path d="M8 6c-1.7 0-3.2.7-4.3 1.8L2.2 6.3C3.7 4.9 5.7 4 8 4s4.3.9 5.8 2.3l-1.5 1.5C11.2 6.7 9.7 6 8 6z" fill="currentColor"/><circle cx="8" cy="10" r="2" fill="currentColor"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2" stroke="currentColor" stroke-width="1.2" fill="none"/><rect x="22" y="4" width="2" height="4" rx="0.5" fill="currentColor" opacity="0.4"/><rect x="1.5" y="2.5" width="14" height="7" rx="1" fill="currentColor"/></svg>
      </div>
    </div>

    <!-- Hero Image -->
    <div class="hero-wrap">
      <img class="hero-image" src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=800&h=600&fit=crop" alt="Mediterranean Grain Bowl">
      <a class="hero-btn hero-btn-back" href="recipe-detail-full.html">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <a class="hero-btn hero-btn-save" href="#">
        <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </a>
    </div>

    <!-- Simplified detail content as background -->
    <div class="detail-content">
      <div class="detail-tags">
        <span class="tag">Healthy</span>
        <span class="tag">Quick</span>
        <span class="tag">Vegetarian</span>
      </div>
      <h1 class="detail-title">Mediterranean Grain Bowl</h1>
      <div class="meta-row">
        <div class="meta-item">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          45 min
        </div>
        <div class="meta-item">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          2 servings
        </div>
        <div class="meta-item">
          <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Easy
        </div>
      </div>
    </div>

  </div>

  <!-- Overlay backdrop -->
  <div class="phone-overlay-backdrop"></div>

  <!-- Gantt Chart Modal -->
  <div class="gantt-modal">

    <!-- Header -->
    <div class="gantt-header">
      <div class="gantt-header-left">
        <span class="gantt-header-title">Cooking Timeline</span>
        <span class="gantt-time-badge">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          45 min
        </span>
      </div>
      <button class="gantt-close">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Time Axis -->
    <div class="gantt-time-axis">
      <span>0</span>
      <span>10</span>
      <span>20</span>
      <span>30</span>
      <span>40</span>
    </div>

    <!-- Gantt Rows -->
    <!-- Step 1: Prep veggies — 0-18% (0-8 min) -->
    <div class="gantt-row">
      <div class="gantt-label">Prep veggies</div>
      <div class="gantt-track">
        <div class="gantt-bar gantt-bar-active" style="left: 0%; width: 18%;">8m</div>
      </div>
    </div>

    <!-- Step 2: Boil water — 0-27% (0-12 min), parallel with step 1 -->
    <div class="gantt-row">
      <div class="gantt-label">Boil water</div>
      <div class="gantt-track">
        <div class="gantt-bar gantt-bar-active" style="left: 0%; width: 27%;">12m</div>
      </div>
    </div>

    <!-- Step 3: Cook quinoa — 18-56% (8-25 min) -->
    <div class="gantt-row">
      <div class="gantt-label">Cook quinoa</div>
      <div class="gantt-track">
        <div class="gantt-bar gantt-bar-active" style="left: 18%; width: 38%;">17m</div>
      </div>
    </div>

    <!-- Step 4: Make dressing — 27-36% (12-16 min), prep ahead, parallel with step 3 -->
    <div class="gantt-row">
      <div class="gantt-label">Make dressing</div>
      <div class="gantt-track">
        <div class="gantt-bar gantt-bar-prep" style="left: 27%; width: 9%;">4m</div>
      </div>
    </div>

    <!-- Step 5: Simmer sauce — 36-62% (16-28 min) -->
    <div class="gantt-row">
      <div class="gantt-label">Simmer sauce</div>
      <div class="gantt-track">
        <div class="gantt-bar gantt-bar-active" style="left: 36%; width: 26%;">12m</div>
      </div>
    </div>

    <!-- Step 6: Plate & serve — 62-71% (28-32 min) -->
    <div class="gantt-row">
      <div class="gantt-label">Plate & serve</div>
      <div class="gantt-track">
        <div class="gantt-bar gantt-bar-active" style="left: 62%; width: 9%;">4m</div>
      </div>
    </div>

    <!-- Legend -->
    <div class="gantt-legend">
      <div class="gantt-legend-item">
        <div class="legend-swatch-active"></div>
        <span>Active</span>
      </div>
      <div class="gantt-legend-item">
        <div class="legend-swatch-prep"></div>
        <span>Prep ahead</span>
      </div>
    </div>

    <!-- Edit note -->
    <div class="gantt-edit-note">Drag bars to adjust timing</div>

  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <a class="nav-item" href="feed-following.html"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><span>Feed</span></a>
    <a class="nav-item active" href="recipes-library.html"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div><span>Recipes</span></a>
    <a class="nav-item" href="shopping-list.html"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg></div><span>Lists</span></a>
    <a class="nav-item" href="planner.html"><div class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><span>Planner</span></a>
    <a class="nav-item" href="profile.html"><div class="nav-icon"><img class="nav-avatar" src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=80&h=80&fit=crop&crop=face" alt="You"></div><span>Profile</span></a>
  </div>

</div>
</body>
</html>
