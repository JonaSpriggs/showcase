<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUS - All Palettes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  body { font-family: var(--font); background: #2a2a26; padding: 32px 20px 60px; }
  h1 { text-align: center; font-size: 32px; font-weight: 800; color: #f0ebe4; margin-bottom: 4px; letter-spacing: -0.5px; }
  h1 span { color: #d4a024; }
  .subtitle { text-align: center; font-size: 14px; color: #8a8a80; margin-bottom: 12px; }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #d4a024;
    text-align: center;
    margin: 48px 0 24px;
    padding-top: 48px;
    border-top: 1px solid #3a3a35;
  }
  .section-title:first-of-type { border-top: none; padding-top: 0; margin-top: 32px; }
  .grid {
    display: flex;
    gap: 32px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 2400px;
    margin: 0 auto;
  }
  .wrap { display: flex; flex-direction: column; align-items: center; }
  .label { font-size: 16px; font-weight: 700; margin-bottom: 4px; text-align: center; color: #e0ddd5; }
  .desc { font-size: 12px; color: #8a8a80; margin-bottom: 14px; text-align: center; max-width: 760px; line-height: 1.5; }
  .phones { display: flex; gap: 16px; }

  /* Phone frame */
  .phone { width: 360px; height: 780px; border-radius: 36px; position: relative; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.3); display: flex; flex-direction: column; }
  .sb { display: flex; justify-content: space-between; align-items: center; padding: 12px 22px 6px; font-size: 11px; font-weight: 700; height: 40px; flex-shrink: 0; }
  .sb svg { width: 16px; height: 12px; }
  .hdr { display: flex; justify-content: space-between; align-items: center; padding: 6px 16px 10px; height: 48px; flex-shrink: 0; }
  .logo { font-size: 26px; font-weight: 800; letter-spacing: -1px; }
  .hdr-actions { display: flex; gap: 12px; align-items: center; }
  .hi { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; border-radius: 50%; }
  .hi svg { width: 20px; height: 20px; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .nb { position: absolute; top: -2px; right: -4px; min-width: 14px; height: 14px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; color: white; padding: 0 3px; }
  .hi.plus-btn { width: 32px; height: 32px; }
  .stabs { display: flex; height: 44px; flex-shrink: 0; }
  .stab { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; }
  .strip { height: 4px; width: 100%; flex-shrink: 0; }
  .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 28px; text-align: center; }
  .ei { font-size: 42px; opacity: 0.35; margin-bottom: 14px; }
  .et { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  .ed { font-size: 12px; line-height: 1.6; margin-bottom: 20px; max-width: 220px; }
  .cta { padding: 10px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; font-family: var(--font); }
  .bnav { position: absolute; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; align-items: center; padding: 6px 0 24px; height: 72px; }
  .ni { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 10px; font-weight: 500; cursor: pointer; padding: 4px 8px; position: relative; }
  .ni svg { width: 20px; height: 20px; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .ni.active::after { content: ''; width: 4px; height: 4px; border-radius: 50%; margin-top: 1px; }
  .nav-avatar { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; border: 2px solid #555; }
  .ni.active .nav-avatar { border-color: currentColor; }

  /* Pill active for ReciMe style */
  .pill-active .ni.active svg { position: relative; z-index: 1; }
  .pill-active .ni.active::before { content: ''; position: absolute; top: 0; width: 40px; height: 32px; border-radius: 10px; z-index: 0; }
  .pill-active .ni.active::after { display: none; }
  .pill-active .ni.active span { font-weight: 700; }

  .chips { display: flex; gap: 5px; margin-top: 10px; justify-content: center; }
  .chip { width: 24px; height: 24px; border-radius: 5px; border: 2px solid rgba(255,255,255,0.1); }

  /* ============ RECIPE DETAIL STYLES ============ */
  .recipe-scroll { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .recipe-hero { width: 100%; height: 220px; object-fit: cover; flex-shrink: 0; }
  .recipe-body { flex: 1; padding: 16px 20px 80px; overflow: hidden; }
  .recipe-tags { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .recipe-tag { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 12px; }
  .recipe-title { font-size: 22px; font-weight: 800; line-height: 1.2; margin-bottom: 4px; }
  .recipe-author { font-size: 12px; margin-bottom: 12px; }
  .recipe-meta { display: flex; gap: 16px; margin-bottom: 14px; }
  .recipe-meta-item { display: flex; align-items: center; gap: 4px; font-size: 11px; }
  .recipe-meta-item svg { width: 14px; height: 14px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .recipe-desc { font-size: 12px; line-height: 1.6; margin-bottom: 14px; }
  .recipe-section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .recipe-ingredient { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 12px; border-bottom: 1px solid transparent; }
  .recipe-ingredient .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .recipe-ingredient .qty { font-weight: 700; min-width: 36px; }
  .recipe-actions { display: flex; gap: 10px; margin-bottom: 14px; }
  .recipe-action-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; border-radius: 10px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; font-family: var(--font); }
  .recipe-action-btn svg { width: 16px; height: 16px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  /* Back button on recipe detail */
  .recipe-back { position: absolute; top: 46px; left: 16px; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2; backdrop-filter: blur(8px); }
  .recipe-back svg { width: 18px; height: 18px; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .recipe-save { position: absolute; top: 46px; right: 16px; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2; backdrop-filter: blur(8px); }
  .recipe-save svg { width: 18px; height: 18px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

];

document.addEventListener('DOMContentLoaded', () => {
  const body = document.querySelector('body');
  let currentGrid;

  palettes.forEach(p => {
    if (p.section) {
      const st = document.createElement('div');
      st.className = 'section-title';
      st.textContent = p.title;
      body.appendChild(st);
      currentGrid = document.createElement('div');
      currentGrid.className = 'grid';
      body.appendChild(currentGrid);
      return;
    }

    const wrap = document.createElement('div');
    wrap.className = `wrap ${p.cls}`;

    const chipsHTML = p.chips.map(c => `<div class="chip" style="background:${c};"></div>`).join('');

    wrap.innerHTML = `
      <div class="label">${p.label}</div>
      <div class="desc">${p.desc}</div>
      <div class="phones">
        <div class="phone">${p.plus ? feedPhonePlus(p.emoji) : feedPhone(p.emoji)}</div>

      </div>
      <div class="chips">${chipsHTML}</div>

    currentGrid.appendChild(wrap);
  });
});
