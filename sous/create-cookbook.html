<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUS - New Cookbook</title>
<link rel="stylesheet" href="design.css">
<style>
  .nav-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
  .nav-item.active .nav-avatar { border-color: var(--primary); }
  .nav-icon svg { stroke-width: 1.8; }
  .nav-item { font-size: 11px; font-weight: 500; letter-spacing: 0.2px; }
  .nav-item.active { font-weight: 600; }
  .nav-item.active::after { content: ''; display: block; width: 4px; height: 4px; border-radius: 50%; background: var(--primary); margin-top: 2px; }

  .header-left {
    display: flex;
    align-items: center;
    gap: var(--sp-3);
  }
  .close-btn {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    text-decoration: none;
    border-radius: var(--radius-full);
    transition: background var(--transition-fast);
  }
  .close-btn:hover { background: var(--surface); }
  .close-btn svg {
    width: 20px;
    height: 20px;
    stroke: var(--text);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .header-publish {
    font-size: var(--text-sm);
    font-weight: var(--weight-semibold);
    color: var(--white);
    background: var(--primary);
    border: none;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-family: var(--font-family);
    opacity: 0.5;
    pointer-events: none;
  }

  .form-content {
    padding: var(--sp-4);
  }

  .cover-upload {
    width: 100%;
    height: 180px;
    border: 2px dashed var(--border);
    border-radius: var(--radius-lg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--sp-2);
    color: var(--text-muted);
    cursor: pointer;
    transition: all var(--transition-fast);
    background: var(--surface);
    margin-bottom: var(--sp-4);
  }
  .cover-upload:hover {
    border-color: var(--primary);
    color: var(--text-light);
  }
  .cover-upload svg {
    width: 32px;
    height: 32px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .cover-upload span {
    font-size: var(--text-sm);
    font-weight: var(--weight-medium);
  }

  .form-group {
    margin-bottom: var(--sp-4);
  }
  .form-label {
    font-size: var(--text-sm);
    font-weight: var(--weight-semibold);
    color: var(--text);
    margin-bottom: var(--sp-2);
    display: block;
  }

  .price-input-wrapper {
    position: relative;
  }
  .price-prefix {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: var(--text-base);
    color: var(--text-light);
    font-weight: var(--weight-semibold);
    pointer-events: none;
  }
  .price-input-wrapper .input {
    padding-left: 32px;
  }

  .video-upload {
    width: 100%;
    height: 80px;
    border: 2px dashed var(--border);
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--sp-2);
    color: var(--text-muted);
    cursor: pointer;
    transition: all var(--transition-fast);
    background: var(--surface);
  }
  .video-upload:hover {
    border-color: var(--primary);
    color: var(--text-light);
  }
  .video-upload svg {
    width: 20px;
    height: 20px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .video-upload span {
    font-size: var(--text-sm);
    font-weight: var(--weight-medium);
  }

  .recipes-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--sp-3);
  }
  .recipes-header-left {
    display: flex;
    align-items: baseline;
    gap: var(--sp-2);
  }
  .recipe-count {
    font-size: var(--text-sm);
    color: var(--text-muted);
    font-weight: var(--weight-medium);
  }

  .group-label {
    font-size: var(--text-xs);
    font-weight: var(--weight-semibold);
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: var(--sp-2) 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: var(--sp-1);
  }

  .recipe-row {
    display: flex;
    align-items: center;
    gap: var(--sp-3);
    padding: var(--sp-3) 0;
    border-bottom: 1px solid var(--border);
  }
  .recipe-row:last-child { border-bottom: none; }

  .drag-handle {
    color: var(--text-muted);
    font-size: var(--text-lg);
    cursor: grab;
    flex-shrink: 0;
    user-select: none;
    line-height: 1;
  }

  .recipe-thumb {
    width: 44px;
    height: 44px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    flex-shrink: 0;
  }
  .recipe-info {
    flex: 1;
    min-width: 0;
  }
  .recipe-row-title {
    font-size: var(--text-sm);
    font-weight: var(--weight-semibold);
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .recipe-row-meta {
    font-size: var(--text-xs);
    color: var(--text-muted);
    margin-top: 2px;
  }

  .preview-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .preview-label {
    font-size: var(--text-xs);
    color: var(--text-muted);
    font-weight: var(--weight-medium);
  }
  .toggle-track {
    width: 36px;
    height: 20px;
    background: var(--surface-dark);
    border-radius: var(--radius-full);
    position: relative;
    cursor: pointer;
    transition: background var(--transition-fast);
  }
  .toggle-track.on {
    background: var(--primary);
  }
  .toggle-knob {
    width: 16px;
    height: 16px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 2px;
    left: 2px;
    transition: transform var(--transition-fast);
    box-shadow: var(--shadow-sm);
  }
  .toggle-track.on .toggle-knob {
    transform: translateX(16px);
  }

  .add-group-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--sp-2);
    width: 100%;
    padding: var(--sp-3);
    border: none;
    background: none;
    color: var(--text-light);
    font-size: var(--text-sm);
    font-weight: var(--weight-medium);
    font-family: var(--font-family);
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all var(--transition-fast);
  }
  .add-group-btn:hover {
    background: var(--surface);
    color: var(--text);
  }
  .add-group-btn svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="4" width="3" height="8" rx="1" fill="currentColor"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="9" y="0" width="3" height="12" rx="1" fill="currentColor"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="currentColor" opacity="0.3"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2C5.5 2 3.2 3 1.5 4.7L0 3.2C2.1 1.2 4.9 0 8 0s5.9 1.2 8 3.2l-1.5 1.5C12.8 3 10.5 2 8 2zm0 4c-1.5 0-2.9.6-3.9 1.6L2.6 6.1C4 4.8 5.9 4 8 4s4 .8 5.4 2.1l-1.5 1.5C10.9 6.6 9.5 6 8 6zm0 4c-.8 0-1.6.3-2.1.9L8 13l2.1-2.1C9.6 10.3 8.8 10 8 10z" fill="currentColor"/></svg>
      <svg width="22" height="12" viewBox="0 0 22 12"><rect x="0" y="1" width="18" height="10" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="19" y="4" width="2" height="5" rx="1" fill="currentColor"/><rect x="2" y="3" width="12" height="6" rx="1" fill="currentColor"/></svg>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <a href="profile-business.html" class="close-btn">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </a>
      <span class="header-title">New Cookbook</span>
    </div>
    <button class="header-publish" disabled>Publish</button>
  </div>

  <!-- Form -->
  <div class="form-content">

    <!-- Cover Image -->
    <div class="cover-upload">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <span>Tap to add cover</span>
    </div>

    <!-- Title -->
    <div class="form-group">
      <input class="input" type="text" placeholder="Cookbook title">
    </div>

    <!-- Description -->
    <div class="form-group">
      <textarea class="textarea" placeholder="Describe your cookbook..." style="min-height: 72px;"></textarea>
    </div>

    <!-- Price -->
    <div class="form-group">
      <label class="form-label">Price</label>
      <div class="price-input-wrapper">
        <span class="price-prefix">$</span>
        <input class="input" type="number" placeholder="9.99" step="0.01" min="0">
      </div>
    </div>

    <!-- Trailer Video -->
    <div class="form-group">
      <div class="video-upload">
        <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        <span>Add trailer video (optional)</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Recipes Section -->
    <div class="recipes-header">
      <div class="recipes-header-left">
        <span class="section-title" style="margin-bottom: 0;">Recipes</span>
        <span class="recipe-count">3 recipes</span>
      </div>
      <button class="btn btn-secondary btn-sm">Add Recipes</button>
    </div>

    <!-- Group: Quick Weeknights -->
    <div class="group-label">Quick Weeknights</div>

    <div class="recipe-row">
      <span class="drag-handle">&#8801;</span>
      <img class="recipe-thumb" src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=120&h=120&fit=crop" alt="Recipe">
      <div class="recipe-info">
        <div class="recipe-row-title">Lemon Herb Salmon</div>
        <div class="recipe-row-meta">25 min</div>
      </div>
      <div class="preview-toggle">
        <span class="preview-label">Preview</span>
        <div class="toggle-track on"><div class="toggle-knob"></div></div>
      </div>
    </div>

    <div class="recipe-row">
      <span class="drag-handle">&#8801;</span>
      <img class="recipe-thumb" src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=120&h=120&fit=crop" alt="Recipe">
      <div class="recipe-info">
        <div class="recipe-row-title">Mediterranean Grain Bowl</div>
        <div class="recipe-row-meta">20 min</div>
      </div>
      <div class="preview-toggle">
        <span class="preview-label">Preview</span>
        <div class="toggle-track"><div class="toggle-knob"></div></div>
      </div>
    </div>

    <div class="recipe-row">
      <span class="drag-handle">&#8801;</span>
      <img class="recipe-thumb" src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=120&h=120&fit=crop" alt="Recipe">
      <div class="recipe-info">
        <div class="recipe-row-title">Spicy Thai Basil Chicken</div>
        <div class="recipe-row-meta">30 min</div>
      </div>
      <div class="preview-toggle">
        <span class="preview-label">Preview</span>
        <div class="toggle-track"><div class="toggle-knob"></div></div>
      </div>
    </div>

    <!-- Add Group -->
    <button class="add-group-btn">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Group
    </button>

    <div class="divider"></div>

    <!-- Publish Button -->
    <button class="btn btn-primary btn-full">Publish</button>

  </div>

</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <a class="nav-item" href="feed-following.html"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><span>Feed</span></a>
  <a class="nav-item" href="recipes-library.html"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div><span>Recipes</span></a>
  <a class="nav-item" href="shopping-list.html"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg></div><span>Lists</span></a>
  <a class="nav-item" href="planner.html"><div class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><span>Planner</span></a>
  <a class="nav-item active" href="profile.html"><div class="nav-icon"><img class="nav-avatar" src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=80&h=80&fit=crop&crop=face" alt="You"></div><span>Profile</span></a>
</div>

</body>
</html>
