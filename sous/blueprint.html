<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUS - Blueprint (Empty Page Template)</title>
<link rel="stylesheet" href="design.css">
<style>
  /* Nav profile avatar */
  .nav-avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--border);
  }
  .nav-item.active .nav-avatar {
    border-color: var(--primary);
  }

  /* Blueprint overrides — using softened nav */
  .bottom-nav {
    background: #f8eed9;
    border-top: 1px solid #e8d5bc;
  }
  .nav-icon svg {
    stroke-width: 1.8;
  }
  .nav-item {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2px;
  }
  .nav-item.active {
    font-weight: 600;
  }
  /* Active dot under active tab */
  .nav-item.active::after {
    content: '';
    display: block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--primary);
    margin-top: 2px;
  }
</style>
</head>
<body>

<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M1 8h2v4H1zM5 5h2v7H5zM9 2h2v10H9zM13 0h2v12h-2z" fill="currentColor"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="1" width="13" height="10" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M14 4.5v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><rect x="2" y="3" width="7" height="6" rx="1" fill="var(--success)"/></svg>
    </div>
  </div>

  <!-- Header (Logo variant) -->
  <div class="header">
    <div class="header-logo">S<span>OUS</span></div>
    <div class="header-actions">
      <div class="header-icon">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </div>
      <div class="header-icon">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        <div class="notification-badge">3</div>
      </div>
    </div>
  </div>

  <!-- Sub-tabs -->
  <div class="sub-tabs">
    <a class="sub-tab active" href="#">Following</a>
    <a class="sub-tab" href="#">Discover</a>
  </div>

  <!-- Page Content Area -->
  <div class="section" style="padding-top: 32px;">
    <div class="empty-state">
      <div class="empty-state-icon" style="font-size: 48px; opacity: 0.4;">&#9676;</div>
      <div class="empty-state-title">Blueprint Page</div>
      <div class="empty-state-description">Every screen starts from this frame: status bar, header, sub-tabs (optional), content area, and bottom nav.</div>
      <button class="btn btn-primary">Primary Action</button>
    </div>
  </div>

</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <a class="nav-item active" href="#">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <span>Feed</span>
  </a>
  <a class="nav-item" href="#">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    </div>
    <span>Recipes</span>
  </a>
  <a class="nav-item" href="#">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
    </div>
    <span>Lists</span>
  </a>
  <a class="nav-item" href="#">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </div>
    <span>Planner</span>
  </a>
  <a class="nav-item" href="#">
    <div class="nav-icon">
      <img class="nav-avatar" src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=80&h=80&fit=crop&crop=face" alt="You">
    </div>
    <span>Profile</span>
  </a>
</div>

</body>
</html>
