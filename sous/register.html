<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUS - Create Account</title>
<link rel="stylesheet" href="design.css">
<style>
  /* Auth screen overrides */
  body {
    background: var(--bg);
    align-items: center;
    padding: 0;
    min-height: 100vh;
  }

  .auth-container {
    width: var(--phone-width);
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    padding: var(--sp-8) var(--sp-6);
  }

  .auth-logo {
    font-size: 48px;
    font-weight: var(--weight-extrabold);
    color: var(--primary);
    letter-spacing: -2px;
    text-align: center;
    margin-top: var(--sp-10);
    margin-bottom: var(--sp-2);
  }

  .auth-heading {
    font-size: var(--text-2xl);
    font-weight: var(--weight-bold);
    color: var(--text);
    text-align: center;
    margin-bottom: var(--sp-1);
  }

  .auth-subheading {
    font-size: var(--text-sm);
    color: var(--text-light);
    text-align: center;
    margin-bottom: var(--sp-6);
  }

  .auth-form {
    display: flex;
    flex-direction: column;
    gap: var(--sp-4);
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: var(--sp-1);
  }

  .input-label {
    font-size: var(--text-sm);
    font-weight: var(--weight-semibold);
    color: var(--text);
    padding-left: var(--sp-1);
  }

  .input-wrapper {
    position: relative;
  }

  .input-wrapper .input {
    padding-right: 48px;
  }

  .input-toggle {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px;
    transition: color var(--transition-fast);
  }
  .input-toggle:hover {
    color: var(--text-light);
  }
  .input-toggle svg {
    width: 20px;
    height: 20px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Password strength indicator */
  .strength-bar-track {
    height: 4px;
    background: var(--surface);
    border-radius: var(--radius-full);
    margin-top: var(--sp-2);
    overflow: hidden;
  }
  .strength-bar-fill {
    height: 100%;
    border-radius: var(--radius-full);
    transition: width var(--transition-normal), background var(--transition-normal);
  }
  .strength-bar-fill.weak {
    width: 33%;
    background: var(--error);
  }
  .strength-bar-fill.medium {
    width: 66%;
    background: #d4a843;
  }
  .strength-bar-fill.strong {
    width: 100%;
    background: var(--success);
  }
  .strength-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: var(--sp-1);
  }
  .strength-text {
    font-size: var(--text-xs);
    font-weight: var(--weight-medium);
  }
  .strength-text.weak { color: var(--error); }
  .strength-text.medium { color: #d4a843; }
  .strength-text.strong { color: var(--success); }

  .auth-divider {
    display: flex;
    align-items: center;
    gap: var(--sp-4);
    margin: var(--sp-5) 0;
  }
  .auth-divider::before,
  .auth-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .auth-divider span {
    font-size: var(--text-sm);
    color: var(--text-muted);
    white-space: nowrap;
  }

  .social-buttons {
    display: flex;
    flex-direction: column;
    gap: var(--sp-3);
  }

  .btn-social {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--sp-3);
    width: 100%;
    padding: 13px 24px;
    border-radius: var(--radius-md);
    font-family: var(--font-family);
    font-size: var(--text-base);
    font-weight: var(--weight-semibold);
    cursor: pointer;
    transition: all var(--transition-fast);
    text-decoration: none;
  }

  .btn-google {
    background: var(--white);
    color: var(--text);
    border: 2px solid var(--border);
  }
  .btn-google:hover {
    background: var(--surface);
    border-color: var(--surface-dark);
  }

  .btn-apple {
    background: var(--text);
    color: var(--bg);
    border: 2px solid var(--text);
  }
  .btn-apple:hover {
    opacity: 0.9;
  }

  .btn-social svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }

  .auth-footer {
    margin-top: auto;
    padding-top: var(--sp-6);
    text-align: center;
    font-size: var(--text-sm);
    color: var(--text-light);
  }
  .auth-footer a {
    color: var(--primary);
    text-decoration: none;
    font-weight: var(--weight-semibold);
  }
  .auth-footer a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="auth-container">

  <!-- Logo -->
  <div class="auth-logo">SOUS</div>

  <!-- Heading -->
  <h1 class="auth-heading">Create your account</h1>
  <p class="auth-subheading">Start planning meals and cooking with friends</p>

  <!-- Form -->
  <form class="auth-form" onsubmit="return false;">

    <div class="input-group">
      <label class="input-label" for="name">Name</label>
      <input class="input" type="text" id="name" placeholder="Your full name" autocomplete="name">
    </div>

    <div class="input-group">
      <label class="input-label" for="email">Email</label>
      <input class="input" type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="input-group">
      <label class="input-label" for="password">Password</label>
      <div class="input-wrapper">
        <input class="input" type="password" id="password" placeholder="Create a password" autocomplete="new-password">
        <button type="button" class="input-toggle" aria-label="Show password">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <!-- Strength indicator (showing "medium" state as demo) -->
      <div class="strength-bar-track">
        <div class="strength-bar-fill medium"></div>
      </div>
      <div class="strength-label">
        <span class="strength-text medium">Medium</span>
        <span class="text-xs text-muted">Use 8+ characters with mixed types</span>
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-full" style="margin-top: var(--sp-2);">Create Account</button>

  </form>

  <!-- Divider -->
  <div class="auth-divider">
    <span>or continue with</span>
  </div>

  <!-- Social Buttons -->
  <div class="social-buttons">

    <button class="btn-social btn-google">
      <svg viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <button class="btn-social btn-apple">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
      </svg>
      Continue with Apple
    </button>

  </div>

  <!-- Footer -->
  <div class="auth-footer">
    Already have an account? <a href="login.html">Log in</a>
  </div>

</div>

</body>
</html>
