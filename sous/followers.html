<style>
  .nav-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
  .nav-item.active .nav-avatar { border-color: var(--primary); }
  .nav-icon svg { stroke-width: 1.8; }
  .nav-item { font-size: 11px; font-weight: 500; letter-spacing: 0.2px; }
  .nav-item.active { font-weight: 600; }
  .nav-item.active::after { content: ''; display: block; width: 4px; height: 4px; border-radius: 50%; background: var(--primary); margin-top: 2px; }

  .header-back {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    text-decoration: none;
    color: var(--text);
  }
  .header-back svg {
    width: 22px;
    height: 22px;
    stroke: var(--text);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .follower-list {
    padding: 0 var(--sp-4);
  }
  .follower-row {
    display: flex;
    align-items: center;
    gap: var(--sp-3);
    padding: var(--sp-3) 0;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
  }
  .follower-row:last-child { border-bottom: none; }
  .follower-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--border);
    flex-shrink: 0;
  }
  .follower-info {
    flex: 1;
    min-width: 0;
  }
  .follower-name {
    font-size: var(--text-sm);
    font-weight: var(--weight-semibold);
    color: var(--text);
    line-height: var(--leading-tight);
  }
  .follower-username {
    font-size: var(--text-xs);
    color: var(--text-muted);
  }
  .btn-follow-sm {
    padding: 7px 18px;
    border-radius: var(--radius-sm);
    font-size: var(--text-xs);
    font-weight: var(--weight-semibold);
    cursor: pointer;
    font-family: var(--font-family);
    transition: all var(--transition-fast);
    flex-shrink: 0;
    border: 1.5px solid var(--primary);
  }
  .btn-follow-sm.follow {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  .btn-follow-sm.follow:hover { background: var(--primary-hover); }
  .btn-follow-sm.following {
    background: transparent;
    color: var(--primary);
  }
  .btn-follow-sm.following:hover { background: var(--primary-light); }
</style>
</head>
