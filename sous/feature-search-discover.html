<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUS - Search & Discover</title>
<style>
  :root { --sous-green: #6b8f5e; --text: #2d3a2e; --text-light: #7a8272; --surface: #eae7df; --border: #ddd8cf; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--surface); color: var(--text); padding: 40px 20px; }
  .back { display: inline-flex; align-items: center; gap: 6px; color: var(--text-light); text-decoration: none; font-size: 14px; margin-bottom: 24px; transition: color 150ms; }
  .back:hover { color: var(--text); }
  h1 { text-align: center; font-size: 32px; font-weight: 800; letter-spacing: -1px; color: var(--sous-green); margin-bottom: 4px; }
  .subtitle { text-align: center; font-size: 14px; color: var(--text-light); margin-bottom: 40px; }
  .mockup-embed {
    width: 100%;
    border: none;
    display: block;
    margin-bottom: 48px;
    min-height: 900px;
  }
</style>
</head>
<body>
<a class="back" href="index.html">&larr; All Features</a>
<h1>Search & Discover</h1>
<p class="subtitle">49 screens &mdash; unified search, auto-suggest, ingredient search, tag browsing, and discovery</p>

<iframe class="mockup-embed" src="search-all-screens.html" loading="lazy"></iframe>
<iframe class="mockup-embed" src="search-drilldown.html" loading="lazy"></iframe>
<iframe class="mockup-embed" src="search-options-comparison.html" loading="lazy"></iframe>
<iframe class="mockup-embed" src="feed-discover.html" loading="lazy"></iframe>
<iframe class="mockup-embed" src="browse-by-tag-flow.html" loading="lazy"></iframe>
<iframe class="mockup-embed" src="browse-by-tag-options.html" loading="lazy"></iframe>
<iframe class="mockup-embed" src="tag-hero-options.html" loading="lazy"></iframe>
<iframe class="mockup-embed" src="tag-ux-designs.html" loading="lazy"></iframe>

<script>
function resizeIframes() {
  document.querySelectorAll('.mockup-embed').forEach(iframe => {
    iframe.addEventListener('load', function() {
      try {
        this.style.height = this.contentDocument.documentElement.scrollHeight + 'px';
      } catch(e) {}
    });
  });
}
resizeIframes();
</script>
</body>
</html>
