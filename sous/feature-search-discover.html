<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUS - Search & Discover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #ddd8cf; color: #2d3a2e; padding: 20px 0 0; }
  .back { display: inline-flex; align-items: center; gap: 6px; color: #7a8272; text-decoration: none; font-size: 14px; margin: 0 20px 20px; transition: color 150ms; }
  .back:hover { color: #2d3a2e; }
  .mockup-embed {
    width: 100%;
    border: none;
    display: block;
    min-height: 900px;
  }
</style>
</head>
<body>
<a class="back" href="index.html">&larr; All Features</a>

<iframe class="mockup-embed" src="search-all-screens.html" loading="lazy"></iframe>
<iframe class="mockup-embed" src="search-options-comparison.html" loading="lazy"></iframe>
<iframe class="mockup-embed" src="feed-discover.html" loading="lazy"></iframe>
<iframe class="mockup-embed" src="browse-by-tag-flow.html" loading="lazy"></iframe>
<iframe class="mockup-embed" src="tag-ux-designs.html" loading="lazy"></iframe>

<script>
document.querySelectorAll('.mockup-embed').forEach(iframe => {
  iframe.addEventListener('load', function() {
    try {
      this.style.height = this.contentDocument.documentElement.scrollHeight + 'px';
    } catch(e) {}
  });
});
</script>
</body>
</html>
