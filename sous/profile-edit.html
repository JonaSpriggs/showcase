<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUS - Edit Profile</title>
<link rel="stylesheet" href="design.css">
<style>
  .nav-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
  .nav-item.active .nav-avatar { border-color: var(--primary); }
  .nav-icon svg { stroke-width: 1.8; }
  .nav-item { font-size: 11px; font-weight: 500; letter-spacing: 0.2px; }
  .nav-item.active { font-weight: 600; }
  .nav-item.active::after { content: ''; display: block; width: 4px; height: 4px; border-radius: 50%; background: var(--primary); margin-top: 2px; }

  .header-close {
    display: flex;
    align-items: center;
    text-decoration: none;
    color: var(--text);
  }
  .header-close svg {
    width: 22px;
    height: 22px;
    stroke: var(--text);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .btn-save {
    padding: 8px 18px;
    border-radius: var(--radius-sm);
    font-size: var(--text-sm);
    font-weight: var(--weight-semibold);
    cursor: pointer;
    font-family: var(--font-family);
    transition: all var(--transition-fast);
    background: var(--primary);
    color: #fff;
    border: none;
  }
  .btn-save:hover { background: var(--primary-hover); }

  .avatar-upload {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: var(--sp-6) 0 var(--sp-4);
  }
  .avatar-upload-wrapper {
    position: relative;
    width: 88px;
    height: 88px;
    margin-bottom: var(--sp-2);
    cursor: pointer;
  }
  .avatar-upload-img {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--primary);
  }
  .avatar-camera-overlay {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 28px;
    height: 28px;
    background: var(--primary);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--bg);
  }
  .avatar-camera-overlay svg {
    width: 14px;
    height: 14px;
    stroke: #fff;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .avatar-upload-text {
    font-size: var(--text-sm);
    color: var(--primary);
    font-weight: var(--weight-semibold);
  }

  .form-section {
    padding: 0 var(--sp-4);
  }
  .form-group {
    margin-bottom: var(--sp-4);
  }
  .form-label {
    font-size: var(--text-sm);
    font-weight: var(--weight-semibold);
    color: var(--text);
    margin-bottom: var(--sp-2);
    display: block;
  }
  .input-with-icon {
    position: relative;
  }
  .input-status-icon {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .input-status-icon svg {
    width: 16px;
    height: 16px;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }
  .input-status-icon.available svg { stroke: var(--success); }

  .char-count {
    text-align: right;
    font-size: var(--text-xs);
    color: var(--text-muted);
    margin-top: var(--sp-1);
  }

  .upgrade-section {
    margin-top: var(--sp-6);
    padding: var(--sp-4);
    margin-left: var(--sp-4);
    margin-right: var(--sp-4);
    background: var(--surface);
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    color: var(--text);
  }
  .upgrade-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .upgrade-title {
    font-size: var(--text-sm);
    font-weight: var(--weight-semibold);
    color: var(--text);
  }
  .upgrade-desc {
    font-size: var(--text-xs);
    color: var(--text-light);
  }
  .upgrade-arrow svg {
    width: 18px;
    height: 18px;
    stroke: var(--text-muted);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="4" width="3" height="8" rx="1" fill="currentColor"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="9" y="0" width="3" height="12" rx="1" fill="currentColor"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="currentColor" opacity="0.3"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2C5.5 2 3.2 3 1.5 4.7L0 3.2C2.1 1.2 4.9 0 8 0s5.9 1.2 8 3.2l-1.5 1.5C12.8 3 10.5 2 8 2z" fill="currentColor"/><path d="M8 6c-1.7 0-3.2.7-4.3 1.8L2.2 6.3C3.7 4.9 5.7 4 8 4s4.3.9 5.8 2.3l-1.5 1.5C11.2 6.7 9.7 6 8 6z" fill="currentColor"/><circle cx="8" cy="10" r="2" fill="currentColor"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2" stroke="currentColor" stroke-width="1.2" fill="none"/><rect x="22" y="4" width="2" height="4" rx="0.5" fill="currentColor" opacity="0.4"/><rect x="1.5" y="2.5" width="14" height="7" rx="1" fill="currentColor"/></svg>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <a class="header-close" href="profile.html">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </a>
    <span class="header-title">Edit Profile</span>
    <button class="btn-save">Save</button>
  </div>

  <!-- Avatar Upload -->
  <div class="avatar-upload">
    <div class="avatar-upload-wrapper">
      <img class="avatar-upload-img" src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=200&h=200&fit=crop&crop=face" alt="Emma Wilson">
      <div class="avatar-camera-overlay">
        <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </div>
    </div>
    <span class="avatar-upload-text">Change photo</span>
  </div>

  <!-- Form -->
  <div class="form-section">

    <div class="form-group">
      <label class="form-label">Name</label>
      <input type="text" class="input" value="Emma Wilson">
    </div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <div class="input-with-icon">
        <input type="text" class="input" value="@emma.cooks">
        <div class="input-status-icon available">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Bio</label>
      <textarea class="textarea" rows="3" style="min-height: 80px;">Home cook | Plant lover | Sharing wholesome recipes for busy weeknights</textarea>
      <div class="char-count">87/150</div>
    </div>

    <div class="form-group">
      <label class="form-label">Website</label>
      <input type="url" class="input" placeholder="https://your-website.com">
    </div>

  </div>

  <!-- Upgrade to Business -->
  <a class="upgrade-section" href="settings-business.html">
    <div class="upgrade-left">
      <span class="upgrade-title">Upgrade to Business</span>
      <span class="upgrade-desc">Create cookbooks, access analytics & more</span>
    </div>
    <div class="upgrade-arrow">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </a>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <a class="nav-item" href="feed-following.html"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><span>Feed</span></a>
    <a class="nav-item" href="recipes-library.html"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div><span>Recipes</span></a>
    <a class="nav-item" href="shopping-list.html"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg></div><span>Lists</span></a>
    <a class="nav-item" href="planner.html"><div class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><span>Planner</span></a>
    <a class="nav-item active" href="profile.html"><div class="nav-icon"><img class="nav-avatar" src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=80&h=80&fit=crop&crop=face" alt="You"></div><span>Profile</span></a>
  </div>

</div>
</body>
</html>
