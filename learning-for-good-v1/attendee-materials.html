<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workshop Materials — Learning for Good</title>
  <link rel="stylesheet" href="design.css">
  <style>
    .portal-header-bar {
      height: 4px;
      background: linear-gradient(90deg, var(--brand-teal) 0%, var(--brand-teal) 33%, var(--brand-purple) 33%, var(--brand-purple) 66%, var(--brand-orange) 66%, var(--brand-orange) 100%);
    }
    .portal-header .logo-text .t { color: var(--brand-teal); }
    .portal-header .logo-text .p { color: var(--brand-purple); }
    .portal-header .logo-text .o { color: var(--brand-orange); }
    .material-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--sp-4);
      background: var(--bg-white);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-light);
      margin-bottom: var(--sp-3);
      box-shadow: var(--shadow-sm);
    }
    .material-info {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
    }
    .material-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-xs);
      font-weight: var(--weight-bold);
      text-transform: uppercase;
      color: white;
      flex-shrink: 0;
    }
    .material-icon--pptx { background: var(--brand-orange); }
    .material-icon--pdf { background: var(--error); }
    .material-name {
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      color: var(--text);
    }
    .material-size {
      font-size: var(--text-xs);
      color: var(--text-muted);
    }
    .section-card {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      padding: var(--sp-5);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
      margin-bottom: var(--sp-4);
    }
    .section-card h3 {
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      margin-bottom: var(--sp-3);
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-2);
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      color: var(--text-light);
      margin-bottom: var(--sp-4);
    }
    .back-link:hover { color: var(--primary); }
    .back-link svg {
      width: 16px; height: 16px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
  </style>
</head>
<body class="portal-layout">

  <!-- Tricolour bar -->
  <div class="portal-header-bar"></div>

  <!-- Header -->
  <div class="portal-header">
    <h1>
      <span class="logo-text">
        <span class="t">Learning</span> <span class="p">for</span> <span class="o">Good</span>
      </span>
    </h1>
    <p>Workshop Materials</p>
  </div>

  <!-- Body -->
  <div class="portal-body">

    <!-- Back link -->
    <a href="attendee-confirm.html" class="back-link">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back to my bookings
    </a>

    <!-- Workshop info -->
    <div class="workshop-card">
      <div class="workshop-card-header">
        <div class="workshop-card-title">Leading a Team</div>
        <span class="badge badge--attended">Attended</span>
      </div>
      <div class="workshop-card-meta">
        <span>
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          20 June 2025
        </span>
      </div>
    </div>

    <!-- Downloadable Materials -->
    <div class="section-card">
      <h3>Downloadable Materials</h3>

      <div class="material-item">
        <div class="material-info">
          <div class="material-icon material-icon--pptx">PPTX</div>
          <div>
            <div class="material-name">Leadership Slides.pptx</div>
            <div class="material-size">2.4 MB</div>
          </div>
        </div>
        <button class="btn btn--primary btn--sm">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download
        </button>
      </div>

      <div class="material-item">
        <div class="material-info">
          <div class="material-icon material-icon--pdf">PDF</div>
          <div>
            <div class="material-name">Reflection Worksheet.pdf</div>
            <div class="material-size">540 KB</div>
          </div>
        </div>
        <button class="btn btn--primary btn--sm">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download
        </button>
      </div>

      <div class="material-item">
        <div class="material-info">
          <div class="material-icon material-icon--pdf">PDF</div>
          <div>
            <div class="material-name">Session Notes.pdf</div>
            <div class="material-size">320 KB</div>
          </div>
        </div>
        <button class="btn btn--primary btn--sm">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download
        </button>
      </div>
    </div>

    <!-- Feedback prompt -->
    <div class="alert alert--info">
      <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
      </svg>
      You haven't submitted feedback for this workshop yet.
      <a href="feedback-form.html" style="margin-left: auto; font-weight: var(--weight-semibold);">Give Feedback</a>
    </div>

  </div>

</body>
</html>
